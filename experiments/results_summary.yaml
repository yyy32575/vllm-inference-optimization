# vLLM 推理优化实验结果数据
# 测试环境：A100 40GB × 1, Llama-2 13B, vLLM 0.4.0

results:
  # 实验1: 动态 vs 静态 Batching
  exp_001_batching_strategy:
    test_date: "2026-06-10"
    test_environment:
      gpu: "A100 40GB"
      model: "Llama-2-13B"
      vllm_version: "0.4.0"
    
    fcfs_baseline:
      max_num_seqs: 256
      max_num_batched_tokens: 8192
      throughput_tokens_per_sec: 3800
      p50_latency_ms: 85
      p95_latency_ms: 720
      p99_latency_ms: 1200
      gpu_utilization_percent: 68
      gpu_memory_used_gb: 38.2
    
    dynamic_batching_optimized:
      max_num_seqs: 128
      max_num_batched_tokens: 12288
      throughput_tokens_per_sec: 4650  # +22.4%
      p50_latency_ms: 72
      p95_latency_ms: 580  # -19.4%
      p99_latency_ms: 950   # -20.8%
      gpu_utilization_percent: 78     # +14.7%
      gpu_memory_used_gb: 38.5
    
    improvement_percentage:
      throughput: 22.4
      p95_latency: -19.4
      p99_latency: -20.8
      gpu_utilization: 14.7
  
  # 实验2: Prefix Cache 影响
  exp_002_prefix_caching:
    test_date: "2026-06-10"
    
    without_prefix_cache:
      throughput_tokens_per_sec: 4650
      p95_latency_ms: 580
      gpu_memory_used_gb: 38.5
      cache_hit_ratio: "N/A"
    
    with_prefix_cache:
      throughput_tokens_per_sec: 5820  # +25.2%
      p95_latency_ms: 475   # -18.1%
      gpu_memory_used_gb: 37.2  # -3.4%
      cache_hit_ratio: 0.68
    
    workload_breakdown:
      short_requests_150_tokens:
        throughput_improvement: 18.5
        latency_improvement: 12.3
        cache_hit_ratio: 0.72
      
      medium_requests_512_tokens:
        throughput_improvement: 26.8
        latency_improvement: 19.5
        cache_hit_ratio: 0.68
      
      long_requests_1024_tokens:
        throughput_improvement: 31.2
        latency_improvement: 22.1
        cache_hit_ratio: 0.63
  
  # 实验3: 长短请求分流
  exp_003_request_segregation:
    test_date: "2026-06-11"
    
    without_segregation:
      overall_throughput_tokens_per_sec: 5820
      short_request_p95_latency_ms: 280
      long_request_p95_latency_ms: 850
      gpu_utilization_percent: 82
    
    with_segregation:
      short_queue_config:
        max_num_seqs: 256
        max_num_batched_tokens: 16384
        throughput_tokens_per_sec: 6200  # dedicated short path
        p95_latency_ms: 145  # -48.2% vs without segregation
        queue_depth_avg: 8
      
      long_queue_config:
        max_num_seqs: 64
        max_num_batched_tokens: 8192
        throughput_tokens_per_sec: 3200  # dedicated long path
        p95_latency_ms: 920   # +8.2% acceptable tradeoff
        queue_depth_avg: 12
      
      overall_metrics:
        blended_throughput_tokens_per_sec: 7840  # +34.7%
        weighted_p95_latency_ms: 385    # -55.6% vs unified queue
        gpu_utilization_percent: 85     # +3.7%
    
    request_distribution:
      short_ratio: 0.4
      long_ratio: 0.6
  
  # 实验4: KV Cache 量化
  exp_004_kv_cache_optimization:
    test_date: "2026-06-11"
    
    fp16_baseline:
      batch_size: 256
      sequence_length: 2048
      throughput_tokens_per_sec: 7840
      p95_latency_ms: 385
      gpu_memory_used_gb: 38.5
      prefill_latency_ms: 145
      decode_latency_per_token_ms: 12.5
    
    float8_quantized:
      batch_size: 256
      sequence_length: 2048
      throughput_tokens_per_sec: 8420  # +7.4%
      p95_latency_ms: 358   # -7.0%
      gpu_memory_used_gb: 30.2  # -21.6%
      prefill_latency_ms: 142
      decode_latency_per_token_ms: 11.8
    
    int8_quantized:
      batch_size: 256
      sequence_length: 2048
      throughput_tokens_per_sec: 8150  # +3.9%
      p95_latency_ms: 372   # -3.4%
      gpu_memory_used_gb: 28.8  # -25.2%
      prefill_latency_ms: 148
      decode_latency_per_token_ms: 12.1
    
    attention_backend_comparison:
      flashattention2_float8:
        throughput_improvement: 12.8
        latency_improvement: 9.2
      
      triton_float8:
        throughput_improvement: 4.6
        latency_improvement: 2.1
  
  # 实验5: 参数搜索结果 (Top-5 配置)
  exp_005_hyperparameter_grid_search:
    test_date: "2026-06-11"
    search_space_size: 1440  # 5×5×3×2×2
    total_experiments_run: 847
    
    optimal_config_rank_1:
      name: "High-throughput Configuration"
      max_num_seqs: 256
      max_num_batched_tokens: 16384
      max_model_len: 4096
      enable_prefix_caching: true
      scheduling_strategy: "priority_queue"
      throughput_tokens_per_sec: 8950
      p95_latency_ms: 425
      p99_latency_ms: 680
      gpu_utilization_percent: 86
      score: 9.2  # composite score
    
    optimal_config_rank_2:
      name: "Balanced Configuration"
      max_num_seqs: 128
      max_num_batched_tokens: 12288
      max_model_len: 2048
      enable_prefix_caching: true
      scheduling_strategy: "priority_queue"
      throughput_tokens_per_sec: 8420
      p95_latency_ms: 358
      p99_latency_ms: 620
      gpu_utilization_percent: 82
      score: 8.8
    
    optimal_config_rank_3:
      name: "Low-latency Configuration"
      max_num_seqs: 64
      max_num_batched_tokens: 8192
      max_model_len: 2048
      enable_prefix_caching: true
      scheduling_strategy: "fcfs"
      throughput_tokens_per_sec: 7200
      p95_latency_ms: 290
      p99_latency_ms: 450
      gpu_utilization_percent: 78
      score: 8.1
    
    pareto_frontier:
      - throughput: 8950
        p95_latency: 425
        config_id: "rank_1"
      - throughput: 8420
        p95_latency: 358
        config_id: "rank_2"
      - throughput: 7200
        p95_latency: 290
        config_id: "rank_3"

# 对标 baseline 的综合提升
summary:
  baseline_throughput: 3800
  optimized_throughput: 8950
  overall_improvement_percent: 135.5
  
  baseline_p95_latency: 720
  optimized_p95_latency: 425
  latency_reduction_percent: 40.9
  
  baseline_gpu_utilization: 68
  optimized_gpu_utilization: 86
  utilization_improvement_percent: 26.5
  
  key_optimization_contributions:
    dynamic_batching_improvement: 22.4
    prefix_cache_improvement: 25.2
    request_segregation_improvement: 34.7
    kv_cache_quantization_improvement: 7.4
    hyperparameter_tuning_improvement: 8.2
